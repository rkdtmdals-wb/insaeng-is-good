let S={tab:'calendar',cat:'nausea',recipe:null,dailyIdx:0,water:0,meals:[],cIng:{},sym:{},diary:'',dH:[],manualName:'',manualCal:'',manualPro:'',mealHistory:[],calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),selDate:new Date().toISOString().split('T')[0],vitals:{},chemoInfo:{cycle:'',startDate:''}};

// Load from Firebase (real-time listener)
dataRef.on('value',snap=>{
  const d=snap.val();
  if(d&&!skipSync){
    const local={tab:S.tab,cat:S.cat,recipe:S.recipe,dailyIdx:S.dailyIdx,calYear:S.calYear,calMonth:S.calMonth,selDate:S.selDate,cIng:S.cIng,manualName:S.manualName,manualCal:S.manualCal,manualPro:S.manualPro,diary:S.diary,sym:S.sym};
    Object.assign(S,d);
    Object.assign(S,local); // keep local UI state
    S.recipe=null;
    ren();
  }
  const dot=document.getElementById('syncDot');
  if(dot)dot.className='sync-dot sync-on';
});

function save(){
  skipSync=true;
  const toSave={water:S.water,meals:S.meals,dH:S.dH,mealHistory:S.mealHistory,vitals:S.vitals,chemoInfo:S.chemoInfo};
  dataRef.set(toSave).then(()=>{skipSync=false;}).catch(()=>{skipSync=false;});
}

function sTab(id){S.tab=id;S.recipe=null;ren();}
function ren(){rTabs();const a=document.getElementById('app');switch(S.tab){case'calendar':a.innerHTML=rCal();break;case'recipes':a.innerHTML=S.recipe?rDet():rList();break;case'daily':a.innerHTML=rDaily();break;case'tracker':a.innerHTML=rTracker();break;case'health':a.innerHTML=rHealth();break;case'guide':a.innerHTML=rGuide();break;case'info':a.innerHTML=rInfo();break;}}

// === CALENDAR ===
function rCal(){
const y=S.calYear,m=S.calMonth,today=new Date().toISOString().split('T')[0];
const mN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const dN=['일','월','화','수','목','금','토'];
const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
let cells=dN.map((d,i)=>`<div class="cal-hd" style="${i===0?'color:var(--coral)':''}${i===6?'color:var(--blue)':''}">${d}</div>`).join('');
for(let i=0;i<fd;i++)cells+=`<div class="cal-day empty"></div>`;
for(let d=1;d<=dim;d++){
const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const hasData=S.vitals&&S.vitals[ds]||S.dH&&S.dH.find(x=>x.date===ds);
const dow=new Date(y,m,d).getDay();
let cls='cal-day';
if(ds===today)cls+=' today';if(ds===S.selDate&&ds!==today)cls+=' sel';if(hasData)cls+=' has-data';if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';
cells+=`<div class="${cls}" onclick="selDay('${ds}')">${d}</div>`;}

const sd=S.selDate,v=(S.vitals&&S.vitals[sd])||{},diary=S.dH?S.dH.find(x=>x.date===sd):null;
let chemoHtml='';
if(S.chemoInfo&&S.chemoInfo.cycle&&S.chemoInfo.startDate){const diff=Math.floor((new Date(sd)-new Date(S.chemoInfo.startDate))/864e5)+1;if(diff>0)chemoHtml=`<div class="chemo-badge">💉 ${S.chemoInfo.cycle}차 항암 ${diff}일째</div>`;}
else if(S.chemoInfo&&S.chemoInfo.cycle)chemoHtml=`<div class="chemo-badge">💉 ${S.chemoInfo.cycle}차 항암</div>`;

let det=`<div class="c"><h3>📋 ${sd}</h3>${chemoHtml}`;
if(v.bp||v.temp||v.weight){det+=`<div class="record-card">`;if(v.bp)det+=`<div style="font-size:12px;margin-bottom:3px">🩸 혈압: <b>${v.bp}</b></div>`;if(v.temp)det+=`<div style="font-size:12px;margin-bottom:3px">🌡️ 체온: <b>${v.temp}°C</b></div>`;if(v.weight)det+=`<div style="font-size:12px">⚖️ 체중: <b>${v.weight}kg</b></div>`;det+=`<div style="display:flex;gap:4px;margin-top:6px"><button class="edit-btn" onclick="editV('${sd}')">✏️수정</button><button class="del-btn" onclick="delV('${sd}')">🗑️삭제</button></div></div>`;}else det+=`<p style="font-size:11px;color:var(--txl)">바이탈 기록 없음</p>`;
if(diary){det+=`<div class="record-card" style="margin-top:6px"><div style="font-size:11px;font-weight:600;margin-bottom:3px">📝 일기</div>`;if(diary.symptoms&&diary.symptoms.length)det+=`<div style="margin-bottom:3px">${diary.symptoms.map(s=>'<span class="badge" style="background:#FFF0F0;color:var(--coral)">'+s+'</span>').join('')}</div>`;det+=`<p style="font-size:11px;line-height:1.4">${diary.text||'(없음)'}</p><div style="display:flex;gap:4px;margin-top:6px"><button class="edit-btn" onclick="editD2('${sd}')">✏️수정</button><button class="del-btn" onclick="delD2('${sd}')">🗑️삭제</button></div></div>`;}
det+=`</div>`;

let inp=`<div class="c"><h3>✏️ 기록 입력</h3><div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;margin-bottom:4px">💉 항암 차수</div><div class="vital-row"><label>차수</label><input type="text" placeholder="예:4" value="${(S.chemoInfo&&S.chemoInfo.cycle)||''}" oninput="S.chemoInfo.cycle=this.value;save()"></div><div class="vital-row"><label>시작일</label><input type="date" value="${(S.chemoInfo&&S.chemoInfo.startDate)||''}" oninput="S.chemoInfo.startDate=this.value;save()"></div></div><div style="font-size:11px;font-weight:600;margin-bottom:4px">🩺 바이탈</div><div class="vital-row"><label>🩸혈압</label><input type="text" id="vBp" placeholder="120/80" value="${v.bp||''}"></div><div class="vital-row"><label>🌡️체온</label><input type="number" id="vTp" placeholder="36.5" step="0.1" value="${v.temp||''}"></div><div class="vital-row"><label>⚖️체중</label><input type="number" id="vWt" placeholder="kg" step="0.1" value="${v.weight||''}"></div><button class="btn bp" style="margin-top:5px" onclick="saveV('${sd}')">💾 저장</button></div>`;
return`<div class="fd"><div class="c"><div class="cal-nav"><button onclick="pM()">◀</button><span>${y}년 ${mN[m]}</span><button onclick="nM()">▶</button></div><div class="cal-grid">${cells}</div></div>${det}${inp}</div>`;}
function selDay(d){S.selDate=d;ren();}
function pM(){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}ren();}
function nM(){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}ren();}
function saveV(d){const bp=document.getElementById('vBp')?.value,tp=document.getElementById('vTp')?.value,wt=document.getElementById('vWt')?.value;if(!bp&&!tp&&!wt){alert('하나 이상 입력해주세요');return;}if(!S.vitals)S.vitals={};S.vitals[d]={bp:bp||null,temp:tp?parseFloat(tp):null,weight:wt?parseFloat(wt):null};save();alert('저장 💚');ren();}
function editV(d){const v=S.vitals[d];const bp=prompt('혈압:',v.bp||'');if(bp===null)return;const tp=prompt('체온°C:',v.temp||'');if(tp===null)return;const wt=prompt('체중kg:',v.weight||'');if(wt===null)return;S.vitals[d]={bp:bp||null,temp:tp?parseFloat(tp):null,weight:wt?parseFloat(wt):null};save();ren();}
function delV(d){if(confirm('바이탈 삭제?')){delete S.vitals[d];save();ren();}}
function editD2(d){const i=S.dH.findIndex(x=>x.date===d);if(i<0)return;const t=prompt('일기 수정:',S.dH[i].text);if(t===null)return;S.dH[i].text=t;save();ren();}
function delD2(d){if(confirm('일기 삭제?')){S.dH=S.dH.filter(x=>x.date!==d);save();ren();}}

// === RECIPES ===
function rList(){const ch=CATS.map(c=>{const ac=S.cat===c.id;return`<button class="cb" style="background:${ac?c.color:'#fff'};color:${ac?'#fff':'#2D3A2D'}" onclick="S.cat='${c.id}';ren()"><i>${c.emoji}</i><div class="l">${c.label}</div><div class="d">${c.desc}</div></button>`;}).join('');const rs=R[S.cat]||[];return`<div class="fd"><div class="cg">${ch}</div><div class="c"><h3>📋 ${CATS.find(c=>c.id===S.cat).label} (${rs.length}개)</h3>${rs.map((r,i)=>`<div class="ri" onclick="oR('${S.cat}',${i})"><div><div style="font-size:12px;font-weight:600">${r.emoji} ${r.name}</div><div style="font-size:9px;color:var(--txl)">⏱${r.time} 🔥${r.cal}kcal 💪${r.pro}g</div></div><span style="color:#ccc">›</span></div>`).join('')}</div></div>`;}
function oR(c,i){S.recipe={cat:c,idx:i};S.cIng={};ren();}
function rDet(){const r=R[S.recipe.cat][S.recipe.idx];const lg=S.meals&&S.meals.some(m=>m.name===r.name);return`<div class="fd"><button class="bk" onclick="S.recipe=null;ren()">← 목록</button><div class="c"><div style="text-align:center;padding:8px 0"><div style="font-size:36px">${r.emoji}</div><h2 style="font-size:15px;font-weight:800;margin-top:4px">${r.name}</h2><p style="font-size:10px;color:var(--txl)">${r.desc}</p><div style="display:flex;justify-content:center;gap:18px;margin-top:8px"><div style="text-align:center"><span style="font-size:15px;font-weight:700;color:var(--g)">${r.cal}</span><div style="font-size:8px;color:var(--txl)">kcal</div></div><div style="text-align:center"><span style="font-size:15px;font-weight:700;color:var(--blue)">${r.pro}g</span><div style="font-size:8px;color:var(--txl)">단백질</div></div></div></div></div><div class="c"><h3>🥗 재료</h3>${r.ing.map((g,i)=>`<div class="cr" onclick="tI(${i})"><div class="cc ${S.cIng[i]?'on':''}">✓</div><span style="${S.cIng[i]?'text-decoration:line-through;color:#8CA88C':''}">${g}</span></div>`).join('')}</div><div class="c"><h3>👨‍🍳 만드는 법</h3>${r.steps.map((s,i)=>`<div style="display:flex;gap:8px;margin-bottom:6px"><div class="sn">${i+1}</div><p style="font-size:11px;line-height:1.5">${s}</p></div>`).join('')}</div><div class="tip"><p style="font-size:11px">💡 ${r.tip}</p></div><button class="btn bp" onclick="lM('${r.name}',${r.cal},${r.pro})" ${lg?'disabled style="opacity:.6"':''}>${lg?'✓ 기록됨':'✅ 식사 기록'}</button></div>`;}
function tI(i){S.cIng[i]=!S.cIng[i];ren();}
function lM(n,c,p){if(!S.meals)S.meals=[];S.meals.push({name:n,cal:c,pro:p,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});save();ren();}

// === DAILY ===
function rDaily(){const tip=DT[S.dailyIdx];return`<div class="fd"><div style="overflow-x:auto;white-space:nowrap;margin-bottom:8px">${DT.map((t,i)=>`<button class="dp" style="background:${S.dailyIdx===i?'var(--g)':'#fff'};color:${S.dailyIdx===i?'#fff':'var(--tx)'}" onclick="S.dailyIdx=${i};ren()">${t.icon} ${t.day}</button>`).join('')}</div><div class="c"><div style="text-align:center;margin-bottom:8px"><div style="font-size:30px">${tip.icon}</div><h3 style="font-size:15px;font-weight:800;margin-top:3px">${tip.day}</h3></div>${tip.tips.map(t=>`<div style="display:flex;gap:6px;padding:4px 0"><div style="width:5px;height:5px;border-radius:50%;background:var(--g);margin-top:5px;flex-shrink:0"></div><p style="font-size:11px;line-height:1.5">${t}</p></div>`).join('')}</div><div class="tip w"><div style="font-size:10px;line-height:1.7;color:#6B5B00">📌 하루: <b>1,800~2,200kcal</b>, 단백질 <b>70~90g</b> · <b>6회 소량씩</b> · 수분 <b>1.5~2L</b></div></div></div>`;}

// === TRACKER ===
function rTracker(){const ms=S.meals||[],tc=ms.reduce((s,m)=>s+m.cal,0),tp=ms.reduce((s,m)=>s+m.pro,0);const wb=Array.from({length:8}).map((_,i)=>`<button class="wb ${i<S.water?'on':''}" onclick="S.water=${i<S.water?i:i+1};save();ren()">${i<S.water?'💧':'○'}</button>`).join('');const ml=ms.length?ms.map((m,i)=>`<div class="ml"><div style="flex:1"><div style="font-size:11px;font-weight:600">${m.name}</div><div style="font-size:8px;color:var(--txl)">${m.time}</div></div><div style="text-align:right;margin-right:5px"><span style="font-size:10px;color:var(--g)">${m.cal}kcal</span></div><div style="display:flex;gap:3px"><button class="edit-btn" onclick="eMl(${i})">✏️</button><button class="del-btn" onclick="dMl(${i})">🗑️</button></div></div>`).join(''):'<div class="es"><i>🍴</i><p style="font-size:10px">식사를 기록해보세요</p></div>';return`<div class="fd"><div class="c"><h3>📊 오늘</h3><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;font-weight:600">🔥 열량</span><span style="font-size:10px;font-weight:700;color:var(--g)">${tc}/2,000kcal</span></div><div class="pg"><div class="pf" style="width:${Math.min(tc/2000*100,100)}%;background:linear-gradient(90deg,var(--g),var(--teal))"></div></div></div><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;font-weight:600">💪 단백질</span><span style="font-size:10px;font-weight:700;color:var(--blue)">${tp}/80g</span></div><div class="pg"><div class="pf" style="width:${Math.min(tp/80*100,100)}%;background:linear-gradient(90deg,var(--blue),var(--teal))"></div></div></div><div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;font-weight:600">💧 수분</span><span style="font-size:10px;font-weight:700;color:var(--blue)">${S.water}/8잔</span></div><div class="wr">${wb}</div></div></div><div class="c"><h3>✏️ 직접 기록</h3><div class="manual-row"><input type="text" id="mN" placeholder="음식 이름" value="${S.manualName||''}" oninput="S.manualName=this.value"></div><div class="manual-row"><input type="number" class="sm" id="mC" placeholder="칼로리" value="${S.manualCal||''}" oninput="S.manualCal=this.value"><input type="number" class="sm" id="mP" placeholder="단백질g" value="${S.manualPro||''}" oninput="S.manualPro=this.value"><button class="btn bp" style="width:auto;padding:8px 12px;font-size:11px" onclick="aM()">추가</button></div></div><div class="c"><h3>🍽️ 오늘 식사</h3>${ml}</div>${tc>0&&tc<1500?'<div class="tip r"><p style="font-size:10px;color:#C0392B;font-weight:600">⚠️ 열량 부족</p></div>':''}<button class="btn bo" onclick="rsT()" style="font-size:10px;padding:8px">🔄 초기화</button></div>`;}
function aM(){const n=S.manualName||'';if(!n.trim()){alert('음식 이름을 입력해주세요');return;}if(!S.meals)S.meals=[];S.meals.push({name:n.trim(),cal:parseInt(S.manualCal)||0,pro:parseInt(S.manualPro)||0,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});S.manualName='';S.manualCal='';S.manualPro='';save();ren();}
function eMl(i){const m=S.meals[i];const n=prompt('음식:',m.name);if(n===null)return;const c=prompt('칼로리:',m.cal);if(c===null)return;S.meals[i]={name:n||m.name,cal:parseInt(c)||0,pro:m.pro,time:m.time};save();ren();}
function dMl(i){if(confirm('삭제?')){S.meals.splice(i,1);save();ren();}}
function rsT(){if(confirm('초기화?')){S.meals=[];S.water=0;save();ren();}}

// === HEALTH ===
function rHealth(){const today=new Date().toISOString().split('T')[0],dhs=S.dH||[],te=dhs.find(d=>d.date===today);const allD=dhs.slice().reverse();let hist='';if(allD.length){hist='<div class="c"><h3>📖 전체 일기</h3>';allD.forEach(d=>{hist+=`<div style="padding:7px 0;border-bottom:1px solid #f0f4f0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:var(--g)">📅 ${d.date}</span><div style="display:flex;gap:3px"><button class="edit-btn" onclick="editD2('${d.date}')">✏️</button><button class="del-btn" onclick="delD2('${d.date}')">🗑️</button></div></div>`;if(d.symptoms&&d.symptoms.length)hist+=`<div style="margin-bottom:2px">${d.symptoms.map(s=>'<span class="badge" style="background:#FFF0F0;color:var(--coral)">'+s+'</span>').join('')}</div>`;hist+=`<p style="font-size:11px;line-height:1.4">${d.text||'(없음)'}</p></div>`;});hist+='</div>';}
return`<div class="fd"><div class="c"><h3>🩺 증상 체크</h3><div class="sg">${SYM.map((s,i)=>`<button class="sb ${S.sym[i]?'on':''}" onclick="S.sym[${i}]=!S.sym[${i}];ren()">${s}</button>`).join('')}</div></div><div class="c"><h3>📝 오늘 몸 상태</h3>${te?'<div class="tip" style="padding:5px 7px;margin-bottom:5px"><p style="font-size:9px;color:#4A6B4A">✅ 오늘 기록 있음. 저장 시 수정.</p></div>':''}<textarea id="dI" placeholder="컨디션, 느낌...">${S.diary}</textarea><button class="btn bp" style="margin-top:6px" onclick="sD()">${te?'💾 수정 저장':'💾 저장'}</button></div>${hist}</div>`;}
function sD(){const t=document.getElementById('dI')?.value||'';S.diary=t;const d=new Date().toISOString().split('T')[0],cs=SYM.filter((_,i)=>S.sym[i]),e={date:d,text:t,symptoms:cs};if(!S.dH)S.dH=[];const ex=S.dH.findIndex(x=>x.date===d);if(ex>=0)S.dH[ex]=e;else S.dH.push(e);save();alert('저장 💚');ren();}

// === GUIDE ===
function rGuide(){let h='<div class="fd">';GS.forEach(s=>{h+=`<div class="section-title">${s.title}</div>`;s.items.forEach(i=>{h+=`<div class="guide-block"><h4>${i.subtitle}</h4><ul>${i.tips.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;});});h+=`<div class="section-title">💡 Q&A</div><div class="c">`;QNA.forEach(q=>{h+=`<div class="qa-item"><div class="qa-q">${q.q}</div><div class="qa-a">${q.a}</div></div>`;});h+=`</div><div class="section-title">⚠️ 주의 식품</div><div class="c">`;AVOID.forEach(a=>{h+=`<div class="ai"><div style="font-size:18px">${a.icon}</div><div><div style="font-size:11px;font-weight:700;color:#C0392B">${a.food}</div><div style="font-size:9px;color:#8B6914">${a.reason}</div></div></div>`;});h+=`</div><div class="section-title">✅ 권장 식품</div><div class="c">`;GOOD.forEach(g=>{h+=`<div class="gi"><div style="font-size:16px">${g.icon}</div><div><div style="font-size:11px;font-weight:600;color:#2D6A2E">${g.food}</div><div style="font-size:9px;color:var(--g)">${g.reason}</div></div></div>`;});h+=`</div></div>`;return h;}

// === INFO ===
function rInfo(){return`<div class="fd"><div class="c"><h3>🔗 실시간 연동 상태</h3><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="sync-dot ${fbConnected?'sync-on':'sync-off'}" style="animation:pulse 2s infinite"></span><span style="font-size:13px;font-weight:600">${fbConnected?'✅ 연결됨 - 가족과 실시간 동기화 중':'❌ 연결 끊김 - 인터넷 확인'}</span></div><p style="font-size:11px;line-height:1.6;color:var(--txl)">이 프로그램은 Firebase를 통해 가족 모두의 데이터가 <b>실시간으로 연동</b>됩니다. 한 분이 기록하면 다른 가족의 화면에도 바로 반영됩니다.</p></div><div class="c"><h3>📱 홈화면 추가</h3><div style="font-size:11px;line-height:1.8"><b>아이폰:</b> Safari → 공유(□↑) → 홈 화면에 추가<br><b>갤럭시:</b> Chrome → ⋮ → 홈 화면에 추가</div></div><div class="c"><h3>🗑️ 데이터 관리</h3><button class="btn" style="background:#FFF0F0;color:var(--coral);font-size:11px;padding:8px" onclick="if(confirm('모든 데이터 삭제?')){dataRef.remove();S={tab:'calendar',cat:'nausea',recipe:null,dailyIdx:0,water:0,meals:[],cIng:{},sym:{},diary:'',dH:[],manualName:'',manualCal:'',manualPro:'',mealHistory:[],calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),selDate:new Date().toISOString().split('T')[0],vitals:{},chemoInfo:{cycle:'',startDate:''}};ren();}">⚠️ 전체 초기화</button><p style="font-size:9px;color:var(--txl);margin-top:3px">모든 가족의 데이터가 삭제됩니다</p></div></div>`;}

ren();
</script></body></html>
