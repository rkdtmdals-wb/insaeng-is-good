{subtitle:'울렁거리고 토할 것 같으실 때',tips:['증상이 심할 때는 억지로 드시지 말고 휴식을 취하세요','차가운 음료, 냄새가 적고 수분이 적은 마른 음식(누른 밥, 토스트), 부드러운 과일이 도움이 됩니다','속이 좀 진정되면 미음이나 죽부터 시작해 서서히 일반식으로 넘어갑니다']},
{subtitle:'입과 목이 아프실 때',tips:['삼키기 쉬운 부드러운 음식(죽, 미음, 부드러운 빵)을 드세요','뜨거운 음식은 피하고, 실온으로 식히거나 차게 해서 드시는 것이 좋습니다','입안이 쓰리면 빨대를 활용해 보세요']},
{subtitle:'설사를 하실 때',tips:['탈수 방지를 위해 물이나 이온음료를 충분히 드시고, 소화가 잘 되는 음식(흰죽, 감자 등)을 드세요','강한 양념, 기름진 음식, 유제품, 카페인, 탄산음료는 꼭 피하세요','손실된 칼륨 보충을 위해 바나나, 토마토가 좋습니다']},
{subtitle:'변비가 생기셨을 때',tips:['식사량과 수분 섭취를 늘리고, 섬유질이 많은 채소를 드세요','배변 1시간 전에 따뜻한 차를 드시면 장 운동에 도움이 됩니다']},
{subtitle:'면역력이 떨어지셨을 때 (백혈구 저하)',tips:['절대 주의: 익히지 않은 고기, 생선, 조개, 젓갈류(게장 등)는 피하세요','과일과 채소는 아주 깨끗하게 씻어 드시고, 물은 반드시 끓여서 드세요']}
]}
];

const QNA=[
{q:'Q. 암에 좋다는 엑기스나 달인 물, 먹어도 될까요?',a:'절대 금물입니다. 간이나 신장에 무리를 주어 오히려 치료에 큰 방해가 될 수 있습니다. 반드시 의료진과 상의하세요.'},
{q:'Q. 암 환자는 고기를 먹으면 안 되나요?',a:'드셔야 합니다! 고기는 체력 회복에 꼭 필요한 양질의 단백질입니다. 다만 굽거나 튀기기보다는 삶거나 끓인 형태(수육, 찜 등)로 일주일에 200~300g 정도 챙겨 드시는 것이 좋습니다.'},
{q:'Q. 입이나 식도가 헐고 설사할 때, 잡곡밥을 드셔야 할까요?',a:'아닙니다. 거친 잡곡이나 고섬유질 채소는 헐어있는 점막을 자극해 증상을 악화시킬 수 있습니다. 이때는 하얀 쌀밥이나 부드러운 음식 위주로 드셔야 합니다.'},
{q:'Q. 면역력 높이는 특별한 음식이 있나요?',a:'한순간에 면역력을 높여주는 마법의 음식은 없습니다. 입맛이 없으시더라도 밥, 고기/생선, 채소를 골고루, 꾸준히 드시는 것이 최고의 면역력 회복제입니다.'}
];

// State
let S={tab:'recipes',cat:'nausea',recipe:null,dailyIdx:0,water:0,meals:[],cIng:{},sym:{},weight:'',wH:[],diary:'',dH:[],manualName:'',manualCal:'',manualPro:'',mealHistory:[]};
function load(){try{const s=localStorage.getItem('isg_s');if(s){Object.assign(S,JSON.parse(s));S.recipe=null;}}catch(e){}}
function save(){try{localStorage.setItem('isg_s',JSON.stringify(S));}catch(e){}}
load();

function rTabs(){document.getElementById('tabBar').innerHTML=TABS.map(t=>`<button class="t ${S.tab===t.id?'a':''}" onclick="sTab('${t.id}')"><i>${t.icon}</i>${t.label}</button>`).join('');}
function sTab(id){S.tab=id;S.recipe=null;ren();}

function ren(){rTabs();const a=document.getElementById('app');
switch(S.tab){
case'recipes':a.innerHTML=S.recipe?rDetail():rList();break;
case'daily':a.innerHTML=rDaily();break;
case'tracker':a.innerHTML=rTracker();break;
case'health':a.innerHTML=rHealth();break;
case'guide':a.innerHTML=rGuide();break;
case'avoid':a.innerHTML=rAvoid();break;
}save();}

function rList(){
const ch=CATS.map(c=>{const ac=S.cat===c.id;return`<button class="cb" style="background:${ac?c.color:'#fff'};color:${ac?'#fff':'#2D3A2D'};${ac?'box-shadow:0 4px 14px '+c.color+'40':''}" onclick="S.cat='${c.id}';ren()"><i>${c.emoji}</i><div class="l">${c.label}</div><div class="d">${c.desc}</div></button>`;}).join('');
const rs=R[S.cat]||[];
const lh=rs.map((r,i)=>`<div class="ri" onclick="oR('${S.cat}',${i})"><div><div class="rn">${r.emoji} ${r.name}</div><div class="rm">⏱ ${r.time} · 🔥 ${r.cal}kcal · 💪 ${r.pro}g</div></div><span style="color:#ccc;font-size:16px">›</span></div>`).join('');
return`<div class="fd"><div class="cg">${ch}</div><div class="c"><h3>📋 ${CATS.find(c=>c.id===S.cat).label} 레시피 (${rs.length}개)</h3>${lh}</div></div>`;
}

function oR(cat,idx){S.recipe={cat,idx};S.cIng={};ren();}

function rDetail(){
const r=R[S.recipe.cat][S.recipe.idx];
const ih=r.ing.map((g,i)=>`<div class="cr" onclick="tI(${i})"><div class="cc ${S.cIng[i]?'on':''}">✓</div><span style="${S.cIng[i]?'text-decoration:line-through;color:#8CA88C':''}">${g}</span></div>`).join('');
const sh=r.steps.map((s,i)=>`<div style="display:flex;gap:9px;margin-bottom:9px"><div class="sn">${i+1}</div><p style="font-size:12px;line-height:1.6;padding-top:2px">${s}</p></div>`).join('');
const lg=S.meals.some(m=>m.name===r.name);
return`<div class="fd">
<button class="bk" onclick="S.recipe=null;ren()">← 목록으로</button>
<div class="c"><div class="dh"><i>${r.emoji}</i><h2>${r.name}</h2><p style="font-size:11px;color:#8CA88C;margin-top:3px">${r.desc}</p><div style="display:flex;justify-content:center;gap:22px;margin-top:12px"><div style="text-align:center"><div style="font-size:17px;font-weight:700;color:#5B8C5A">${r.cal}</div><div style="font-size:9px;color:#8CA88C">kcal</div></div><div style="text-align:center"><div style="font-size:17px;font-weight:700;color:#45B7D1">${r.pro}g</div><div style="font-size:9px;color:#8CA88C">단백질</div></div><div style="text-align:center"><div style="font-size:17px;font-weight:700;color:#F7DC6F">${r.time}</div><div style="font-size:9px;color:#8CA88C">조리시간</div></div></div></div></div>
<div class="c"><h3>🥗 재료</h3>${ih}</div>
<div class="c"><h3>👨‍🍳 만드는 법</h3>${sh}</div>
<div class="tip"><div style="font-size:12px;font-weight:700;margin-bottom:3px">💡 항암 케어 팁</div><p style="font-size:11px;line-height:1.6;color:#4A6B4A">${r.tip}</p></div>
<button class="btn bp" onclick="lM('${r.name}',${r.cal},${r.pro})" ${lg?'disabled style="opacity:.6"':''}>${lg?'✓ 기록 완료':'✅ 오늘 식사 기록하기'}</button>
</div>`;
}

function tI(i){S.cIng[i]=!S.cIng[i];ren();}
function lM(n,c,p){const now=new Date();S.meals.push({name:n,cal:c,pro:p,time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});ren();}

function rDaily(){
const ps=DT.map((t,i)=>`<button class="dp" style="background:${S.dailyIdx===i?'#5B8C5A':'#fff'};color:${S.dailyIdx===i?'#fff':'#2D3A2D'}" onclick="S.dailyIdx=${i};ren()">${t.icon} ${t.day}</button>`).join('');
const tip=DT[S.dailyIdx];
const th=tip.tips.map((t,i)=>`<div style="display:flex;align-items:flex-start;gap:7px;padding:7px 0;${i<tip.tips.length-1?'border-bottom:1px solid #f0f4f0':''}"><div style="width:5px;height:5px;border-radius:50%;background:#5B8C5A;margin-top:6px;flex-shrink:0"></div><p style="font-size:12px;line-height:1.6">${t}</p></div>`).join('');
return`<div class="fd">
<div style="overflow-x:auto;white-space:nowrap;padding-bottom:3px;margin-bottom:10px">${ps}</div>
<div class="c"><div style="text-align:center;margin-bottom:12px"><div style="font-size:36px">${tip.icon}</div><h3 style="font-size:17px;font-weight:800;margin-top:5px">${tip.day}</h3></div>${th}</div>
<div class="tip w"><div style="font-size:12px;font-weight:700;margin-bottom:5px">📌 항암 사이클별 식사 핵심 원칙</div><div style="font-size:11px;line-height:1.8;color:#6B5B00">• 하루 목표: <b>1,800~2,200kcal</b>, 단백질 <b>70~90g</b><br>• 한 번에 많이 먹기보다 <b>하루 6회 소량씩</b><br>• 수분은 하루 <b>1.5~2리터</b> (식사 중 제외)<br>• 식사 30분 전후로 물 마시기 자제</div></div>
</div>`;
}

function rTracker(){
const tc=S.meals.reduce((s,m)=>s+m.cal,0);
const tp=S.meals.reduce((s,m)=>s+m.pro,0);
const cp=Math.min((tc/2000)*100,100);
const pp=Math.min((tp/80)*100,100);
const wb=Array.from({length:8}).map((_,i)=>`<button class="wb ${i<S.water?'on':''}" onclick="S.water=${i<S.water?i:i+1};ren()">${i<S.water?'💧':'○'}</button>`).join('');
const ml=S.meals.length?S.meals.map((m,i)=>`<div class="ml" style="align-items:center"><div style="flex:1"><div style="font-size:12px;font-weight:600">${m.name}</div><div style="font-size:9px;color:#8CA88C">${m.time}</div></div><div style="text-align:right;margin-right:8px"><div style="font-size:11px;font-weight:600;color:#5B8C5A">${m.cal}kcal</div><div style="font-size:9px;color:#45B7D1">단백질 ${m.pro}g</div></div><div style="display:flex;gap:4px"><button onclick="editMeal(${i})" style="border:none;background:#E8F0E8;border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit;color:#5B8C5A">✏️</button><button onclick="delMeal(${i})" style="border:none;background:#FFF0F0;border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit;color:#FF6B6B">🗑️</button></div></div>`).join(''):'<div class="es"><i>🍴</i><p style="font-size:11px">레시피 탭 또는 아래에서 식사를 기록하세요</p></div>';
const warn=tc>0&&tc<1500?'<div class="tip r"><p style="font-size:11px;color:#C0392B;font-weight:600">⚠️ 오늘 섭취 열량이 부족합니다. 간식이나 영양 음료를 추가로 드시는 것을 권합니다.</p></div>':'';

// Past meal history
const today=new Date().toISOString().split('T')[0];
const pastMH=S.mealHistory||[];
const pastDates=[...new Set(pastMH.map(h=>h.date))].sort().reverse().slice(0,7);
let histHtml='';
if(pastDates.length){
histHtml='<div class="c"><h3>📖 지난 식사 기록</h3>';
pastDates.forEach(d=>{
const dayMeals=pastMH.filter(m=>m.date===d);
const dayTc=dayMeals.reduce((s,m)=>s+m.cal,0);
const dayTp=dayMeals.reduce((s,m)=>s+m.pro,0);
histHtml+=`<div style="padding:8px 0;border-bottom:1px solid #f0f4f0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;font-weight:700">📅 ${d}</span><span style="font-size:10px;color:#5B8C5A">${dayTc}kcal · ${dayTp}g 단백질</span></div>`;
dayMeals.forEach((m,i)=>{
histHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0 3px 12px"><span style="font-size:11px">${m.name} <span style="color:#8CA88C;font-size:9px">${m.time}</span></span><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#5B8C5A">${m.cal}kcal</span><button onclick="delPastMeal('${d}',${i})" style="border:none;background:#FFF0F0;border-radius:5px;padding:2px 6px;font-size:9px;cursor:pointer;color:#FF6B6B">삭제</button></div></div>`;
});
histHtml+=`</div>`;
});
histHtml+='</div>';
}

return`<div class="fd">
<div class="c"><h3>📊 오늘의 영양 현황</h3>
<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">🔥 열량</span><span style="font-size:11px;font-weight:700;color:#5B8C5A">${tc} / 2,000 kcal</span></div><div class="pg"><div class="pf" style="width:${cp}%;background:linear-gradient(90deg,#5B8C5A,#4ECDC4)"></div></div></div>
<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">💪 단백질</span><span style="font-size:11px;font-weight:700;color:#45B7D1">${tp} / 80 g</span></div><div class="pg"><div class="pf" style="width:${pp}%;background:linear-gradient(90deg,#45B7D1,#4ECDC4)"></div></div></div>
<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">💧 수분 섭취</span><span style="font-size:11px;font-weight:700;color:#45B7D1">${S.water} / 8 잔</span></div><div class="wr">${wb}</div></div></div>

<div class="c"><h3>✏️ 직접 식사 기록하기</h3>
<p style="font-size:10px;color:#8CA88C;margin-bottom:8px">레시피 외에 직접 드신 음식을 기록하세요</p>
<div class="manual-row"><input type="text" id="mName" placeholder="음식 이름 (예: 수육)" value="${S.manualName||''}" oninput="S.manualName=this.value"></div>
<div class="manual-row"><input type="number" class="sm" id="mCal" placeholder="칼로리" value="${S.manualCal||''}" oninput="S.manualCal=this.value"><input type="number" class="sm" id="mPro" placeholder="단백질(g)" value="${S.manualPro||''}" oninput="S.manualPro=this.value"><button class="btn bp" style="width:auto;padding:10px 14px;font-size:12px" onclick="addManual()">추가</button></div>
<p style="font-size:9px;color:#8CA88C">* 칼로리·단백질을 모르시면 대략적으로 입력해도 됩니다</p>
</div>

<div class="c"><h3>🍽️ 오늘 식사 기록</h3>${ml}</div>
${warn}
${histHtml}
<button class="btn bo" onclick="resetT()" style="font-size:11px;padding:9px">🔄 오늘 기록 초기화</button>
</div>`;
}

function addManual(){
const n=S.manualName||'';
if(!n.trim()){alert('음식 이름을 입력해주세요');return;}
const c=parseInt(S.manualCal)||0;
const p=parseInt(S.manualPro)||0;
const now=new Date();
S.meals.push({name:n.trim(),cal:c,pro:p,time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
S.manualName='';S.manualCal='';S.manualPro='';
ren();
}

function editMeal(i){
const m=S.meals[i];
const newName=prompt('음식 이름을 수정하세요:',m.name);
if(newName===null)return;
const newCal=prompt('칼로리를 수정하세요:',m.cal);
if(newCal===null)return;
const newPro=prompt('단백질(g)을 수정하세요:',m.pro);
if(newPro===null)return;
S.meals[i]={name:newName.trim()||m.name,cal:parseInt(newCal)||0,pro:parseInt(newPro)||0,time:m.time};
ren();
}

function delMeal(i){
if(confirm(S.meals[i].name+' 기록을 삭제하시겠습니까?')){S.meals.splice(i,1);ren();}
}

function delPastMeal(date,idx){
if(!S.mealHistory)return;
const dayMeals=S.mealHistory.filter(m=>m.date===date);
if(idx>=0&&idx<dayMeals.length){
const target=dayMeals[idx];
const gi=S.mealHistory.findIndex(m=>m===target);
if(gi>=0){S.mealHistory.splice(gi,1);save();ren();}
}
}

function saveMealsToHistory(){
if(!S.meals.length)return;
const today=new Date().toISOString().split('T')[0];
if(!S.mealHistory)S.mealHistory=[];
S.meals.forEach(m=>{S.mealHistory.push({...m,date:today});});
}

function resetT(){if(confirm('오늘의 식사 기록과 수분 섭취를 초기화하시겠습니까?\n(기록은 지난 식사 기록에 보관됩니다)')){saveMealsToHistory();S.meals=[];S.water=0;ren();}}

function rHealth(){
const sb=SYM.map((s,i)=>`<button class="sb ${S.sym[i]?'on':''}" onclick="S.sym[${i}]=!S.sym[${i}];ren()">${s}</button>`).join('');
const wH=S.wH.slice(-7);
const wMin=wH.length?Math.min(...wH.map(w=>w.kg))-2:55;
const wMax=wH.length?Math.max(...wH.map(w=>w.kg))+2:75;
const wR=wMax-wMin||1;
const cb=wH.map((w,i)=>{const pct=((w.kg-wMin)/wR)*100;return`<div style="flex:1;text-align:center"><div class="wbar" style="height:${Math.max(pct,5)}%"></div><div class="wl">${w.kg}</div><div class="wl">${w.date.slice(5)}</div></div>`;}).join('');

// Weight history with delete
let wHistHtml='';
if(S.wH.length){
wHistHtml='<div style="margin-top:8px;max-height:120px;overflow-y:auto">';
S.wH.slice().reverse().forEach((w,ri)=>{
const oi=S.wH.length-1-ri;
wHistHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f5f5f5"><span style="font-size:10px;color:#8CA88C">${w.date}</span><span style="font-size:11px;font-weight:600">${w.kg}kg</span><div><button onclick="editWeight(${oi})" style="border:none;background:#E8F0E8;border-radius:5px;padding:2px 6px;font-size:9px;cursor:pointer;color:#5B8C5A;margin-right:3px">수정</button><button onclick="delWeight(${oi})" style="border:none;background:#FFF0F0;border-radius:5px;padding:2px 6px;font-size:9px;cursor:pointer;color:#FF6B6B">삭제</button></div></div>`;
});
wHistHtml+='</div>';
}

// Diary history with edit/delete
const allDiary=S.dH.slice().reverse();
let diaryHtml='';
if(allDiary.length){
diaryHtml='<div class="c"><h3>📖 전체 건강일기 기록</h3>';
allDiary.forEach((d,ri)=>{
const oi=S.dH.length-1-ri;
diaryHtml+=`<div style="padding:10px 0;border-bottom:1px solid #f0f4f0">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
<span style="font-size:11px;font-weight:700;color:#5B8C5A">📅 ${d.date}</span>
<div style="display:flex;gap:4px">
<button onclick="editDiary(${oi})" style="border:none;background:#E8F0E8;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;color:#5B8C5A">✏️ 수정</button>
<button onclick="delDiary(${oi})" style="border:none;background:#FFF0F0;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;color:#FF6B6B">🗑️ 삭제</button>
</div>
</div>
${d.symptoms&&d.symptoms.length?'<div style="margin-bottom:4px">'+d.symptoms.map(s=>'<span class="badge" style="background:#FFF0F0;color:#FF6B6B">'+s+'</span>').join('')+'</div>':''}
<p style="font-size:12px;line-height:1.5;color:#4A6B4A">${d.text||'(기록 없음)'}</p>
${d.weight?'<div style="font-size:10px;color:#5B8C5A;margin-top:3px">⚖️ 체중: '+d.weight+'kg</div>':''}
</div>`;
});
diaryHtml+='</div>';
}

// Check if today already has entry
const today=new Date().toISOString().split('T')[0];
const todayEntry=S.dH.find(d=>d.date===today);
const editLabel=todayEntry?'💾 오늘 건강일기 수정 저장':'💾 오늘 건강일기 저장';

return`<div class="fd">
<div class="c"><h3>⚖️ 체중 기록</h3>
<div style="display:flex;gap:7px;margin-bottom:10px"><input type="number" id="wI" placeholder="체중 (kg)" step="0.1" value="${S.weight}" oninput="S.weight=this.value" style="flex:1"><button class="btn bp" style="width:auto;padding:10px 14px" onclick="sW()">기록</button></div>
${wH.length?'<div class="wc">'+cb+'</div>':'<div class="es"><i>📈</i><p style="font-size:11px">체중을 기록하면 그래프가 나타납니다</p></div>'}
${wHistHtml}</div>
<div class="c"><h3>🩺 오늘의 증상 체크</h3><p style="font-size:10px;color:#8CA88C;margin-bottom:8px">해당하는 증상을 모두 선택하세요</p><div class="sg">${sb}</div></div>
<div class="c"><h3>📝 오늘의 몸 상태 일기</h3>
${todayEntry?'<div class="tip" style="padding:8px 10px;margin-bottom:8px"><p style="font-size:10px;color:#4A6B4A">✅ 오늘 이미 기록이 있습니다. 저장하시면 수정됩니다.</p></div>':''}
<p style="font-size:10px;color:#8CA88C;margin-bottom:7px">오늘 컨디션, 느낌, 특이사항을 자유롭게 적어주세요</p><textarea id="dI" placeholder="예) 오늘은 어제보다 구역감이 덜했다. 아침에 미음을 먹으니 속이 편했다...">${S.diary}</textarea>
<button class="btn bp" style="margin-top:8px" onclick="sD()">${editLabel}</button></div>
${diaryHtml}
</div>`;
}

function sW(){
const w=parseFloat(S.weight);
if(!w||w<20||w>200){alert('올바른 체중을 입력해주세요');return;}
const today=new Date().toISOString().split('T')[0];
const ex=S.wH.findIndex(h=>h.date===today);
if(ex>=0)S.wH[ex].kg=w;else S.wH.push({date:today,kg:w});
alert(w+'kg 기록되었습니다');ren();
}

function sD(){
const text=document.getElementById('dI')?.value||'';
S.diary=text;
const today=new Date().toISOString().split('T')[0];
const cs=SYM.filter((_,i)=>S.sym[i]);
const entry={date:today,text,symptoms:cs,weight:S.weight||null};
const ex=S.dH.findIndex(d=>d.date===today);
if(ex>=0)S.dH[ex]=entry;else S.dH.push(entry);
save();alert('오늘의 건강일기가 저장되었습니다 💚');ren();
}

function editDiary(idx){
const d=S.dH[idx];
const newText=prompt('일기 내용을 수정하세요:',d.text);
if(newText===null)return;
S.dH[idx].text=newText;
save();ren();
}

function delDiary(idx){
if(confirm(S.dH[idx].date+' 일기를 삭제하시겠습니까?')){
S.dH.splice(idx,1);save();ren();
}
}

function editWeight(idx){
const w=S.wH[idx];
const newW=prompt(w.date+' 체중을 수정하세요 (kg):',w.kg);
if(newW===null)return;
const parsed=parseFloat(newW);
if(!parsed||parsed<20||parsed>200){alert('올바른 체중을 입력해주세요');return;}
S.wH[idx].kg=parsed;save();ren();
}

function delWeight(idx){
if(confirm(S.wH[idx].date+' 체중 기록을 삭제하시겠습니까?')){
S.wH.splice(idx,1);save();ren();
}
}

function rGuide(){
let html='<div class="fd">';
GUIDE_SECTIONS.forEach(sec=>{
html+=`<div class="section-title">${sec.title}</div>`;
sec.items.forEach(item=>{
html+=`<div class="guide-block"><h4>${item.subtitle}</h4><ul>${item.tips.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
});
});
html+=`<div class="section-title">💡 팩트체크 Q&A</div><div class="c">`;
QNA.forEach(q=>{
html+=`<div class="qa-item"><div class="qa-q">${q.q}</div><div class="qa-a">${q.a}</div></div>`;
});
html+=`</div>`;
html+=`<div class="tip w"><div style="font-size:12px;font-weight:700;margin-bottom:5px">🔑 가장 중요한 원칙</div><div style="font-size:12px;line-height:1.8;color:#6B5B00">건강한 영양상태를 유지하여 면역력을 높이는 것이 치료 중 가장 중요합니다. 입맛이 없으시더라도 <b>밥, 고기/생선, 채소를 골고루, 꾸준히</b> 드시는 것이 최고의 면역력 회복제입니다.</div></div>`;
html+=`</div>`;
return html;
}

function rAvoid(){
const ah=AVOID.map(a=>`<div class="ai"><div style="font-size:22px">${a.icon}</div><div><div style="font-size:12px;font-weight:700;color:#C0392B">${a.food}</div><div style="font-size:10px;color:#8B6914;margin-top:1px">${a.reason}</div></div></div>`).join('');
const gh=GOOD.map(g=>`<div class="gi"><div style="font-size:20px">${g.icon}</div><div><div style="font-size:12px;font-weight:600;color:#2D6A2E">${g.food}</div><div style="font-size:10px;color:#5B8C5A">${g.reason}</div></div></div>`).join('');
return`<div class="fd">
<div class="c"><h3>⚠️ 항암·방사선 치료 중 주의 식품</h3><p style="font-size:10px;color:#8CA88C;margin-bottom:8px">독소루비신+이포스파마이드 및 흉부 방사선 치료 기준</p>${ah}</div>
<div class="c"><h3>✅ 적극 권장 식품</h3>${gh}</div>
</div>`;
}

ren();
</script>
</body>
</html>
